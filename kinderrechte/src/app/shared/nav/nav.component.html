<nav class="nav" role="navigation" aria-label="Hauptnavigation">
  <div class="container">
    <a routerLink="/" class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="#03A9F4" stroke-width="2"/>
        <path d="M12 6v6l4 2" stroke="#03A9F4" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Kinder<span>rechte</span>
    </a>

    <button class="nav-toggle" [class.active]="menuOpen()" aria-label="Menü öffnen" [attr.aria-expanded]="menuOpen()" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-menu" [class.open]="menuOpen()" role="menubar">
      @for (link of links; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: link.exact}" class="nav-link" role="menuitem" (click)="closeMenu()">{{ link.label }}</a>
      }
      <button class="nav-play" aria-label="Präsentation starten" (click)="startPresentation(); closeMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  </div>

  <div class="nav-overlay" [class.visible]="menuOpen()" aria-hidden="true" (click)="closeMenu()"></div>
</nav>
