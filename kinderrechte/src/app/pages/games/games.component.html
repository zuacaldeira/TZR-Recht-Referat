<main class="page-content">
  <section class="section">
    <div class="container">
      <h1 class="section-title" appScrollReveal>Spiele</h1>
      <p class="section-subtitle" appScrollReveal>Teste dein Wissen über Kinderrechte — spielerisch und interaktiv!</p>

      <mat-tab-group animationDuration="300ms" class="games-tabs" appScrollReveal>
        <mat-tab label="Quiz">
          <div class="game-panel">
            <app-quiz />
          </div>
        </mat-tab>
        <mat-tab label="Memory">
          <div class="game-panel">
            <app-memory />
          </div>
        </mat-tab>
      </mat-tab-group>
    </div>
  </section>
</main>
