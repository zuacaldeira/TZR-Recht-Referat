<div class="article-flip-card" [class.flipped]="flipped()" (click)="toggle()" (keydown)="onKeydown($event)" tabindex="0" role="button" [attr.aria-label]="'Artikel ' + article().id + ': ' + article().title">
  <div class="article-flip-inner">
    <!-- Front -->
    <div class="article-front" [style.border-top-color]="getCategoryInfo().color">
      <div class="article-front-header" [style.background]="getCategoryInfo().color">
        <span class="article-number">{{ article().id }}</span>
        <span class="article-badge">{{ getCategoryInfo().name }}</span>
      </div>
      <div class="article-front-body">
        <div>
          <h3>{{ article().title }}@if (article().key) { <span class="article-key-star">&#11088;</span> }</h3>
          <p>{{ article().summary }}</p>
        </div>
        <span class="article-flip-hint">Klicken zum Umdrehen</span>
      </div>
    </div>
    <!-- Back -->
    <div class="article-back">
      <h3>Artikel {{ article().id }}: {{ article().title }}</h3>
      <p>{{ article().full }}</p>
      <span class="back-hint">Klicken zum Zurückdrehen</span>
    </div>
  </div>
</div>
